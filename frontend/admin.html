<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrafficScore — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; padding: 32px 24px; }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; }
    .rows { border-top: 1px solid #f0f0f0; }
    .row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; }
    .row .label { color: #888; }
    .row .value { font-weight: 500; color: #111; }
    .row .value.dim { color: #bbb; font-weight: 400; }
    .source-row { padding-top: 12px; font-size: 0.8rem; }
    .source-row a { color: #3b82f6; text-decoration: none; }
    .source-row a:hover { text-decoration: underline; }
    .footer { margin-top: 32px; font-size: 0.78rem; color: #aaa; }
    .loading { color: #aaa; font-size: 0.88rem; }
    .error { color: #ef4444; font-size: 0.88rem; }
  </style>
</head>
<body>
  <h1>TrafficScore Ottawa — Data Status</h1>
  <div class="subtitle">Read-only. To refresh data, re-run the relevant ingestion script on the server.</div>

  <div class="grid" id="grid"><div class="loading">Loading…</div></div>
  <div class="footer" id="footer"></div>

  <script>
    function val(v) {
      if (v === null || v === undefined) return '<span class="dim">—</span>';
      return v;
    }
    function num(n) {
      if (n === null || n === undefined) return '<span class="dim">—</span>';
      return Number(n).toLocaleString();
    }
    function date(s) {
      if (!s) return '<span class="dim">—</span>';
      return s.slice(0, 10);
    }

    function card(title, rows, source) {
      const rowsHtml = rows.map(([label, value]) =>
        `<div class="row"><span class="label">${label}</span><span class="value">${value}</span></div>`
      ).join("");
      const sourceHtml = source
        ? `<div class="source-row">Source: <a href="${source.url}" target="_blank" rel="noopener">${source.label} ↗</a></div>`
        : `<div class="source-row" style="color:#bbb;">Source: internal</div>`;
      return `
        <div class="card">
          <div class="card-title">${title}</div>
          <div class="rows">${rowsHtml}</div>
          ${sourceHtml}
        </div>`;
    }

    fetch("/api/admin/status")
      .then(r => r.json())
      .then(d => {
        const cmd = s => `<code style="font-size:0.78rem;background:#f5f5f5;padding:1px 5px;border-radius:3px;font-family:monospace;">${s}</code>`;
        const autoDown = "Auto — downloads from source URL";
        const manual = "Manual — SSH + run script";

        const cards = [
          card("Road Segments", [
            ["Records",      num(d.road_segments.count)],
            ["Coverage",     "Ottawa region (OSM)"],
            ["Last updated", '<span class="dim">—</span>'],
            ["Updates",      "Manual — SSH + run script"],
            ["Script",       cmd("python -m ingestion.osm_ingest")],
          ], { label: "OpenStreetMap", url: "https://www.openstreetmap.org" }),

          card("TomTom Traffic Data", [
            ["Records",      num(d.tomtom.count)],
            ["Coverage",     d.tomtom.date_from ? `${date(d.tomtom.date_from)} → ${date(d.tomtom.date_to)}` : '<span class="dim">—</span>'],
            ["Last updated", date(d.tomtom.last_pulled)],
            ["Updates",      "Manual — requires paid API key"],
            ["Script",       cmd("python -m ingestion.tomtom_ingest")],
          ], { label: "TomTom Traffic Stats API", url: "https://developer.tomtom.com/traffic-stats/documentation/product-information/introduction" }),

          card("Collision Records", [
            ["Records",      num(d.collisions.count)],
            ["Coverage",     d.collisions.year_from ? `${d.collisions.year_from} – ${d.collisions.year_to}` : '<span class="dim">—</span>'],
            ["Last updated", '<span class="dim">—</span>'],
            ["Updates",      "Manual — download CSV from source first"],
            ["Script",       cmd("python -m ingestion.ottawa_collisions --dir ./data/collisions")],
          ], { label: "Ottawa Open Data", url: "https://open.ottawa.ca/search?q=traffic+collision" }),

          card("Intersection Volumes", [
            ["Records",      num(d.intersection_volumes.count)],
            ["Coverage",     d.intersection_volumes.year_from ? `${d.intersection_volumes.year_from} – ${d.intersection_volumes.year_to}` : '<span class="dim">—</span>'],
            ["Last updated", '<span class="dim">—</span>'],
            ["Updates",      "Manual — download CSV from source first"],
            ["Script",       cmd("python -m ingestion.ottawa_volumes --dir ./data/volumes")],
          ], { label: "Ottawa Open Data", url: "https://open.ottawa.ca/search?q=intersection+volume" }),

          card("Street Scores", [
            ["Segments scored", num(d.scores.scored)],
            ["Total segments",  num(d.scores.total)],
            ["Last computed",   date(d.scores.last_computed)],
            ["Updates",         "Manual — re-run after any data change"],
            ["Scripts",         cmd("python -m scoring.cutthrough") + "<br>" + cmd("python -m scoring.scorer")],
          ], null),

          card("OC Transpo Bus Routes", [
            ["Routes",       num(d.bus_routes.count)],
            ["Coverage",     "Ottawa transit network"],
            ["Last updated", date(d.bus_routes.last_fetched)],
            ["Updates",      autoDown],
            ["Script",       cmd("python -m ingestion.octranspo_gtfs")],
          ], { label: "OC Transpo GTFS", url: "https://www.octranspo.com/en/plan-your-trip/travel-tools/developers/" }),

          card("Neighbourhood Boundaries", [
            ["Neighbourhoods", num(d.neighbourhoods.count)],
            ["Coverage",       "Ottawa ONS Gen 3"],
            ["Last updated",   '<span class="dim">—</span>'],
            ["Updates",        "Auto-downloads from source URL"],
            ["Script",         cmd("python -m ingestion.ottawa_neighbourhoods")],
          ], { label: "Ottawa Open Data — ONS Gen 3", url: "https://open.ottawa.ca/datasets/ottawa::ottawa-neighbourhood-study-ons-neighbourhood-boundaries-gen-3/about" }),
        ];

        document.getElementById("grid").innerHTML = cards.join("");
        document.getElementById("footer").textContent = `Loaded at ${new Date().toLocaleTimeString()}`;
      })
      .catch(() => {
        document.getElementById("grid").innerHTML = '<div class="error">Failed to load — is the API running?</div>';
      });
  </script>
</body>
</html>
