<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrafficScore — Model Validation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; padding: 32px 24px; }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
    .nav { font-size: 0.82rem; margin-bottom: 28px; }
    .nav a { color: #3b82f6; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }

    h2 { font-size: 0.95rem; font-weight: 600; margin: 28px 0 10px; }
    .section-note { font-size: 0.8rem; color: #888; margin-bottom: 12px; }

    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-size: 0.83rem; overflow: hidden; }
    thead th { background: #f8f8f8; padding: 9px 12px; text-align: left; font-weight: 600;
               color: #555; border-bottom: 1px solid #eee; white-space: nowrap; }
    thead th.r { text-align: right; }
    tbody td { padding: 8px 12px; border-bottom: 1px solid #f4f4f4; vertical-align: middle; }
    tbody td.r { text-align: right; font-variant-numeric: tabular-nums; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    .bar-cell { width: 120px; }
    .bar-wrap { display: flex; align-items: center; gap: 6px; }
    .bar-bg { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .bar-label { font-size: 0.78rem; color: #555; width: 34px; text-align: right; flex-shrink: 0; }

    .gap-pill { display: inline-block; padding: 1px 7px; border-radius: 10px;
                font-size: 0.78rem; font-weight: 600; }
    .gap-over  { background: #fee2e2; color: #b91c1c; }
    .gap-under { background: #dbeafe; color: #1d4ed8; }

    .score-badge { display: inline-block; padding: 1px 7px; border-radius: 10px;
                   font-size: 0.78rem; font-weight: 600; }
    .s0  { background: #dcfce7; color: #166534; }
    .s20 { background: #fef9c3; color: #713f12; }
    .s35 { background: #ffedd5; color: #9a3412; }
    .s65 { background: #fee2e2; color: #991b1b; }

    .tag { display: inline-block; padding: 1px 6px; border-radius: 8px;
           font-size: 0.7rem; margin-left: 5px; cursor: help; vertical-align: middle; }
    .tag-ramp      { background: #f1f5f9; color: #94a3b8; }
    .tag-reviewed  { background: #dcfce7; color: #166534; }
    .tag-pattern   { background: #fef9c3; color: #713f12; }

    /* Dim ramp rows; highlight reviewed rows subtly */
    tr.is-ramp     { opacity: 0.5; }
    tr.is-reviewed { background: #f0fdf4 !important; }
    tr.is-pattern  { background: #fefce8 !important; }

    .callout { background: #fefce8; border: 1px solid #fde047; border-radius: 8px;
               padding: 12px 16px; font-size: 0.82rem; color: #713f12; margin-bottom: 14px; line-height: 1.5; }
    .callout strong { font-weight: 600; }

    .stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 4px; }
    .stat-card { background: white; border-radius: 10px; padding: 16px 20px;
                 box-shadow: 0 1px 4px rgba(0,0,0,0.08); min-width: 160px; }
    .stat-label { font-size: 0.78rem; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 1.3rem; font-weight: 700; }
    .stat-sub   { font-size: 0.75rem; color: #aaa; margin-top: 2px; }

    .loading { color: #aaa; font-size: 0.88rem; padding: 20px 0; }
    .error   { color: #ef4444; font-size: 0.88rem; padding: 20px 0; }
    .footer  { margin-top: 32px; font-size: 0.78rem; color: #aaa; }

    .dim { color: #bbb; }

    .legend { font-size: 0.78rem; color: #888; margin-bottom: 10px; display: flex; gap: 16px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
  </style>
</head>
<body>
  <h1>TrafficScore Ottawa — Model Validation</h1>
  <div class="subtitle">Compares volume scores against City of Ottawa measured traffic counts, and checks safety score stability over time.</div>
  <div class="nav"><a href="/admin">← Data Status</a></div>

  <div id="content"><div class="loading">Loading…</div></div>
  <div class="footer" id="footer"></div>

  <script>
    // Researched outliers — rows where we've dug into the cause.
    // Key: road name (exact match). Value: { reason, kind }
    //   kind: 'reviewed' (investigated, expected/explained)
    //         'pattern'  (part of a known systematic bias)
    const RESEARCHED = {
      // Overscored — downtown one-way bus corridor inflation
      'Kent Street':        { kind: 'pattern',  reason: 'Downtown one-way bus corridor. TomTom probe counts are inflated ~10× vs city counts due to OC Transpo GPS data — buses running every few minutes generate hundreds of probe events/day vs a single vehicle count. Known systematic bias for Centretown one-way streets with frequent bus service.' },
      "O'Connor Street":    { kind: 'pattern',  reason: 'Downtown one-way bus corridor. Same pattern as Kent St — OC Transpo bus probe inflation. Probe:vehicle ratios of 8–10× observed at mid-corridor intersections.' },
      'Metcalfe Street':    { kind: 'pattern',  reason: 'Downtown one-way bus corridor. Bus probe inflation pattern. Probe counts 4–10× higher than city intersection counts depending on location.' },
      'Lyon Street North':  { kind: 'pattern',  reason: 'Downtown one-way corridor. Part of the Centretown bus probe inflation pattern, though less severe than Kent/O\'Connor.' },
      'Lees Avenue':        { kind: 'pattern',  reason: 'One-way transitway-adjacent corridor. Likely bus/LRT probe inflation near Lees transit station.' },

      // Overscored — Queensway proximity
      'Parkdale Avenue':    { kind: 'reviewed', reason: 'Queensway (Hwy 417) TomTom segments (690k+ probes) are matched to Parkdale Ave OSM segments at the overpass, but correctly filtered out by road_names_match. Genuine Parkdale Ave TomTom data is ~73–89k probes — high, likely due to proximity to Queensway ramps. City count at Sherwood Dr is at the quieter north end of the road, not the busy south end near the 417.' },

      // Overscored — rural probe bias
      'Devine Road':        { kind: 'reviewed', reason: 'Rural secondary road. Low city count (1,472 vehicles/day) but elevated TomTom score. Likely commercial/farm vehicle probe bias — a small number of trucks making regular runs generates disproportionate probe counts on low-traffic rural roads.' },
      'McGee Side Road':    { kind: 'reviewed', reason: 'Rural tertiary road. Very low city count (397 vehicles/day). Same rural commercial vehicle probe bias as Devine Road.' },
      'Panmure Road':       { kind: 'reviewed', reason: 'Rural secondary. Low count (431 vehicles/day). Rural commercial probe bias.' },

      // Underscored — interchange coverage gaps
      'Aviation Parkway':   { kind: 'reviewed', reason: 'Main corridor scores correctly (85–96) after road_names_match abbreviation fix (Aviation Pky → Aviation Parkway). Outlier is from two interchange-approach segments near Ogilvie Rd/417 that only have 225–248 probe counts — TomTom has sparse coverage at the ramp junction. One segment also has ON-417 data (315k probes) matched to it which is correctly filtered out.' },

      // Underscored — TomTom coverage gaps on specific roads
      'Basil Macdonald Way': { kind: 'reviewed', reason: 'Tertiary road with high city count (39k). Low TomTom probe coverage — road may be relatively new or not well-represented in TomTom\'s probe dataset.' },

      // Underscored — school-adjacent cut-through, August data blind spot
      'Rembrandt Road':      { kind: 'pattern',  reason: 'Residential street adjacent to a school (Parkhaven Ave area). Anecdotally used as a cut-through to Mountainview Avenue during school runs. TomTom data is from August 2024 (summer holidays) — term-time cut-through traffic would be absent. Compounded by sparse TomTom probe coverage on Rembrandt itself; Mountainview scores higher partly because it has a high-probe anchor segment that boosts its spatial fallback. Volume score likely understates reality during September–June.' },

      // Safety score inflation — long dead-end spur inheriting arterial collisions
      'Boundary Road':       { kind: 'pattern',  reason: 'Unclassified dead-end spur (1.3km) off secondary Boundary Road. Safety score of 71 driven by 2 collisions that anchored to the secondary arterial 52–95m from the spur entrance, then spread to the spur via same-name 150m radius. OSM models this as one long segment, so the whole spur inherits the collision — including residents at the far end who are 1.3km+ from the collision points. Known data granularity limitation: fix would require OSM to split the spur into shorter segments.' },
    };

    function scoreBadge(s) {
      if (s === null || s === undefined) return '<span class="dim">—</span>';
      const n = Number(s);
      const cls = n >= 65 ? 's65' : n >= 35 ? 's35' : n >= 20 ? 's20' : 's0';
      return `<span class="score-badge ${cls}">${n}</span>`;
    }

    function corBar(val) {
      const pct = Math.round(val * 100);
      const color = val >= 0.5 ? '#22c55e' : val >= 0.35 ? '#eab308' : '#f97316';
      return `
        <div class="bar-wrap">
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="bar-label">${val.toFixed(3)}</div>
        </div>`;
    }

    function num(n) {
      if (n === null || n === undefined) return '<span class="dim">—</span>';
      return Number(n).toLocaleString();
    }

    function renderCorrelations(rows) {
      const html = rows.map(r => `
        <tr>
          <td>${r.road_class}</td>
          <td class="r">${num(r.pairs)}</td>
          <td class="bar-cell">${corBar(r.spearman)}</td>
          <td class="r">${r.large_mismatch} <span class="dim">(${Math.round(r.large_mismatch / r.pairs * 100)}%)</span></td>
          <td class="r">${r.avg_vol_score}</td>
          <td class="r">${num(r.avg_measured)}</td>
        </tr>`).join('');
      return `
        <table>
          <thead><tr>
            <th>Road class</th>
            <th class="r">Pairs</th>
            <th>Spearman ρ</th>
            <th class="r">Large mismatches (&gt;40 pct pts)</th>
            <th class="r">Avg vol score</th>
            <th class="r">Avg measured (vehicles/day)</th>
          </tr></thead>
          <tbody>${html}</tbody>
        </table>`;
    }

    function renderOutliers(rows, direction) {
      const pillCls = direction === 'over' ? 'gap-over' : 'gap-under';
      const isRamp = rc => typeof rc === 'string' && rc.includes('motorway_link');

      const html = rows.map(r => {
        const ramp = isRamp(r.road_class);
        const info = RESEARCHED[r.name];
        const rowCls = ramp ? 'is-ramp' : info ? `is-${info.kind}` : '';

        let tags = '';
        if (ramp) tags += `<span class="tag tag-ramp" title="Interchange ramp — TomTom coverage gaps expected here">🛣 ramp</span>`;
        if (info) {
          const label = info.kind === 'pattern' ? '⚠︎ known pattern' : '✓ reviewed';
          const cls   = info.kind === 'pattern' ? 'tag-pattern' : 'tag-reviewed';
          tags += `<span class="tag ${cls}" title="${info.reason.replace(/"/g, '&quot;')}">${label}</span>`;
        }

        return `
        <tr class="${rowCls}">
          <td>${r.name || '<span class="dim">unnamed</span>'}${tags}</td>
          <td>${r.road_class}</td>
          <td class="r">${scoreBadge(r.composite_score)}</td>
          <td class="r">${r.pct_rank_score}th pct</td>
          <td class="r">${num(r.measured_volume)}</td>
          <td class="r">${r.pct_rank_measured}th pct</td>
          <td class="r"><span class="gap-pill ${pillCls}">+${r.rank_gap} pts</span></td>
          <td style="font-size:0.78rem;color:#888;">${r.intersection_name}</td>
        </tr>`;
      }).join('');

      const legend = `
        <div class="legend">
          <span class="legend-item"><span class="tag tag-reviewed">✓ reviewed</span> Investigated — cause understood</span>
          <span class="legend-item"><span class="tag tag-pattern">⚠︎ known pattern</span> Part of a documented systematic bias</span>
          <span class="legend-item"><span class="tag tag-ramp">🛣 ramp</span> Interchange ramp — coverage gaps expected</span>
        </div>`;

      return legend + `
        <table>
          <thead><tr>
            <th>Segment</th>
            <th>Class</th>
            <th class="r">Composite</th>
            <th class="r">Vol score rank</th>
            <th class="r">Measured volume</th>
            <th class="r">Measured rank</th>
            <th class="r">Gap</th>
            <th>Nearest count location</th>
          </tr></thead>
          <tbody>${html}</tbody>
        </table>`;
    }

    fetch('/api/validation')
      .then(r => r.json())
      .then(d => {
        const xv = d.safety_xval;
        const content = `
          <h2>Volume Score vs Measured Traffic Counts</h2>
          <div class="section-note">
            Each road segment matched to the nearest City of Ottawa intersection volume count within 55m.
            Spearman ρ compares our TomTom-based volume rank against measured vehicle counts.
            Pairs are deduplicated per segment (nearest count only).
          </div>
          ${renderCorrelations(d.correlations)}

          <h2>Safety Score Stability (2019–2021 vs 2022–2024)</h2>
          <div class="section-note">
            Checks whether streets that had collisions in the early period still had collisions in the later period.
            A high correlation here means safety scores reflect persistent conditions, not random noise.
          </div>
          <div class="stat-row">
            <div class="stat-card">
              <div class="stat-label">Density correlation</div>
              <div class="stat-value">${xv.density_correlation}</div>
              <div class="stat-sub">early vs late collision density</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Active both periods</div>
              <div class="stat-value">${num(xv.both_active)}</div>
              <div class="stat-sub">≥2 collisions in each half</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Went quiet</div>
              <div class="stat-value">${num(xv.went_quiet)}</div>
              <div class="stat-sub">active 2019–21, silent 2022–24</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Newly dangerous</div>
              <div class="stat-value">${num(xv.newly_dangerous)}</div>
              <div class="stat-sub">silent 2019–21, active 2022–24</div>
            </div>
          </div>

          <h2>Overscored Segments <span style="font-weight:400;color:#888;font-size:0.82rem;">— volume score much higher than measured count suggests</span></h2>
          <div class="callout">
            <strong>Known pattern: Centretown one-way bus corridors</strong> (Kent, O'Connor, Metcalfe, Lyon, Lees).
            TomTom probe counts run 4–10× higher than city intersection counts on these streets.
            Likely cause: OC Transpo buses are GPS-tracked continuously — a route running every 5 minutes
            generates hundreds of probe events per day vs a single vehicle count per pass.
            Scores on these streets are probably inflated but directionally correct (they are genuinely busy).
          </div>
          <div class="section-note">
            These segments have a high TomTom-based volume score but a relatively low measured traffic count nearby.
            Could indicate TomTom probe bias, spatial mismatch, or legitimate data gaps. Hover tags for details.
          </div>
          ${renderOutliers(d.overscored, 'over')}

          <h2>Underscored Segments <span style="font-weight:400;color:#888;font-size:0.82rem;">— volume score much lower than measured count suggests</span></h2>
          <div class="section-note">
            These segments have a low TomTom-based volume score but a high measured traffic count nearby.
            Could indicate TomTom coverage gaps (few probes on this road), or a spatial mismatch with the count location.
            Hover tags for details.
          </div>
          ${renderOutliers(d.underscored, 'under')}
        `;
        document.getElementById('content').innerHTML = content;
        document.getElementById('footer').textContent = `Loaded at ${new Date().toLocaleTimeString()}`;
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<div class="error">Failed to load — is the API running?</div>';
      });
  </script>
</body>
</html>
