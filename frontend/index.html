<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrafficScore Ottawa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    #map { width: 100vw; height: 100vh; }

    #sidebar {
      position: fixed;
      top: 0; right: 0;
      width: 320px;
      height: 100vh;
      background: white;
      box-shadow: -2px 0 8px rgba(0,0,0,0.15);
      padding: 20px;
      overflow-y: auto;
      z-index: 1000;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }

    #sidebar.open { transform: translateX(0); }

    #sidebar-handle { display: none; }

    #sidebar h2 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    #sidebar .road-class { color: #666; font-size: 0.85rem; margin-bottom: 16px; }

    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .score-label { font-size: 0.85rem; color: #444; }

    .score-bar-wrap {
      flex: 1;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      margin: 0 10px;
    }

    .score-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .score-value { font-size: 0.85rem; font-weight: 600; width: 32px; text-align: right; }

    .composite-score {
      text-align: center;
      margin: 16px 0;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .composite-score .big { font-size: 2rem; font-weight: 700; }

    #legend {
      position: fixed;
      bottom: 24px;
      left: 12px;
      background: white;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 1000;
      font-size: 0.8rem;
    }

    #legend h4 { margin-bottom: 8px; font-size: 0.85rem; }

    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .legend-swatch { width: 32px; height: 6px; border-radius: 3px; }

    #controls {
      position: fixed;
      top: 12px;
      left: 12px;
      background: white;
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 1000;
    }

    #controls-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 10px;
    }

    #controls-header h3 { font-size: 0.95rem; font-weight: 700; }
    #controls-tagline { font-size: 0.75rem; color: #888; margin-bottom: 8px; }

    #filters-toggle { display: none; }

    select, input[type=range] { width: 100%; margin-top: 4px; }
    label { font-size: 0.8rem; color: #444; }

    #search-form { display: flex; gap: 6px; margin-bottom: 10px; }
    #search-input {
      flex: 1; padding: 5px 8px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 1rem;
    }
    #search-btn {
      padding: 5px 10px; background: #3b82f6; color: white;
      border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer;
    }
    #search-btn:hover { background: #2563eb; }
    #search-results {
      max-height: 140px; overflow-y: auto;
      font-size: 0.78rem; margin-bottom: 8px;
    }

    .addr-message { font-size: 0.85rem; color: #444; font-style: italic; margin: 8px 0 16px; }
    .search-result-item {
      padding: 4px 6px; cursor: pointer; border-radius: 4px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .search-result-item:hover { background: #f0f0f0; }
    .search-result-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-left: 6px;
    }

    #close-sidebar {
      position: absolute;
      top: 12px; right: 12px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #666;
    }

    /* ── Mobile ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      /* Controls: stretch full width across the top */
      #controls {
        left: 8px;
        right: 8px;
        top: 8px;
        width: auto;
      }

      /* Collapsible filters */
      #filters-toggle {
        display: block;
        background: none;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        border-radius: 5px;
        padding: 3px 8px;
        font-size: 0.75rem;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
      }

      #filters-panel {
        display: none;
      }

      #filters-panel.open {
        display: block;
      }

      /* Sidebar: bottom sheet, full height — only transform changes */
      #sidebar {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
        transform: translateY(100%);
        overflow-y: auto;
      }

      /* Peek: shows handle + street name + score chip */
      #sidebar.peek { transform: translateY(calc(100% - 185px)); }

      /* Expanded: full screen */
      #sidebar.open {
        transform: translateY(0);
        border-radius: 0;
      }

      /* Drag handle */
      #sidebar-handle {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 0 8px;
        cursor: pointer;
        margin: -20px -20px 8px;  /* extend to edges over the padding */
        user-select: none;
      }

      .handle-bar {
        width: 40px;
        height: 4px;
        background: #ddd;
        border-radius: 2px;
      }

      /* Prevent iOS auto-zoom on input focus */
      #search-input { font-size: 1rem; padding: 8px 10px; }
      #search-btn { padding: 8px 14px; font-size: 0.9rem; }

      /* Larger tap targets */
      .search-result-item { padding: 10px 8px; }

      /* Legend: compact, bottom-right */
      #legend {
        bottom: 12px;
        left: auto;
        right: 12px;
        font-size: 0.75rem;
        padding: 8px 10px;
        transition: bottom 0.25s ease, opacity 0.25s ease;
      }

      #legend h4 { font-size: 0.8rem; }

      /* Raise legend above peek card, hide when fully open */
      body.sidebar-peek #legend { bottom: 200px; }
      body.sidebar-open #legend { opacity: 0; pointer-events: none; }
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="controls">
  <div id="controls-header">
    <h3>TrafficScore Ottawa</h3>
    <button id="filters-toggle">Filters ▾</button>
  </div>
  <div id="controls-tagline">Find out how busy your street really is</div>
  <form id="search-form">
    <input id="search-input" type="text" placeholder="Street or address…" autocomplete="off" />
    <button id="search-btn" type="submit">Go</button>
  </form>
  <div id="search-results"></div>
  <div id="filters-panel">
    <label>Road type
      <select id="road-class-filter">
        <option value="">All roads</option>
        <option value="residential">Residential</option>
        <option value="tertiary">Tertiary</option>
        <option value="secondary">Secondary</option>
        <option value="primary">Primary</option>
      </select>
    </label>
    <br><br>
    <label>Max score (quieter streets)
      <input type="range" id="max-score" min="10" max="100" value="100" />
      <span id="max-score-label">Any</span>
    </label>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-handle"><div class="handle-bar"></div></div>
  <button id="close-sidebar" aria-label="Close">✕</button>
  <div id="sidebar-content"></div>
</div>

<div id="legend">
  <h4>Street score (lower = better)</h4>
  <div class="legend-row"><div class="legend-swatch" style="background:#22c55e"></div> 0–20 Very quiet</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#facc15"></div> 20–35 Quiet</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#fb923c"></div> 35–65 Moderate</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#dc2626"></div> 65+ Busy/concerning</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map("map", { zoomControl: window.innerWidth > 600 }).setView([45.4215, -75.6972], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 19,
  }).addTo(map);

  let segmentLayer = null;

  function isMobile() { return window.innerWidth <= 600; }

  function scoreColor(score) {
    if (score === null || score === undefined) return "#aaa";
    if (score < 20)  return "#22c55e";
    if (score < 35)  return "#facc15";
    if (score < 65)  return "#fb923c";
    return "#dc2626";
  }

  function scoreLabel(score) {
    if (score === null || score === undefined) return "No data";
    if (score < 20)  return "Very quiet";
    if (score < 35)  return "Quiet";
    if (score < 65)  return "Moderate";
    return "Busy / concerning";
  }

  function segmentColor(props) {
    if (props.volume_score == null) return "#bbb";
    return scoreColor(props.composite_score);
  }

  function segmentOpacity(props) {
    return props.volume_score == null ? 0.4 : 0.85;
  }

  function barColor(score) {
    return scoreColor(score);
  }

  function openSidebar() {
    const sidebar = document.getElementById("sidebar");
    if (isMobile()) {
      sidebar.classList.remove("open");
      sidebar.classList.add("peek");
      document.body.classList.remove("sidebar-open");
      document.body.classList.add("sidebar-peek");
    } else {
      sidebar.classList.remove("peek");
      sidebar.classList.add("open");
      document.body.classList.remove("sidebar-peek");
      document.body.classList.add("sidebar-open");
    }
  }

  function closeSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.remove("open", "peek");
    document.body.classList.remove("sidebar-peek", "sidebar-open");
  }

  const scoreDefinitionsHtml = `
    <div style="margin-top:8px;">
      <button onclick="const p=this.nextElementSibling;const open=p.style.display!=='none';p.style.display=open?'none':'block';this.innerHTML=open?'<span style=&quot;color:#bbb;font-size:0.9em;&quot;>＋</span> What do these mean?':'<span style=&quot;color:#bbb;font-size:0.9em;&quot;>－</span> What do these mean?';"
        style="background:none;border:none;padding:0;font-size:0.78rem;color:#aaa;cursor:pointer;text-align:left;display:flex;align-items:center;gap:3px;">
        <span style="color:#bbb;font-size:0.9em;">＋</span> What do these mean?</button>
      <div style="display:none;margin-top:8px;">
        <table style="width:100%;border-collapse:collapse;font-size:0.78rem;">
          <tr style="border-bottom:1px solid #f0f0f0;">
            <td style="padding:5px 8px 5px 0;color:#555;font-weight:600;white-space:nowrap;vertical-align:top;">Overall</td>
            <td style="padding:5px 0;color:#777;">A weighted combination of volume, speed, safety, and cut-through</td>
          </tr>
          <tr style="border-bottom:1px solid #f0f0f0;">
            <td style="padding:5px 8px 5px 0;color:#555;font-weight:600;white-space:nowrap;vertical-align:top;">Volume</td>
            <td style="padding:5px 0;color:#777;">How busy the street is relative to others in Ottawa</td>
          </tr>
          <tr style="border-bottom:1px solid #f0f0f0;">
            <td style="padding:5px 8px 5px 0;color:#555;font-weight:600;white-space:nowrap;vertical-align:top;">Speed</td>
            <td style="padding:5px 0;color:#777;">How fast traffic moves relative to other streets</td>
          </tr>
          <tr style="border-bottom:1px solid #f0f0f0;">
            <td style="padding:5px 8px 5px 0;color:#555;font-weight:600;white-space:nowrap;vertical-align:top;">Safety</td>
            <td style="padding:5px 0;color:#777;">How frequently collisions occur relative to other streets</td>
          </tr>
          <tr>
            <td style="padding:5px 8px 5px 0;color:#555;font-weight:600;white-space:nowrap;vertical-align:top;">Cut-through</td>
            <td style="padding:5px 0;color:#777;">How likely the street is used as a shortcut compared to other residential streets</td>
          </tr>
        </table>
      </div>
    </div>`;

  function renderRelativeRow(rel) {
    if (!rel || rel.city_percentile == null) return "";
    const classLabel = ["unclassified", "living_street"].includes(rel.road_class)
      ? "residential" : rel.road_class;
    function phrasing(pct) {
      return pct > 50 ? `busier than ${pct}%` : `quieter than ${100 - pct}%`;
    }
    const nbLine = rel.nb_percentile != null && rel.nb_total >= 3
      ? `<div style="margin-top:6px;">Nearby: ${phrasing(rel.nb_percentile)} of ${classLabel} streets (${rel.nb_total} nearby streets)</div>`
      : "";
    return `
      <div style="margin-top:16px;padding:10px 12px;background:#f5f5f5;border-radius:8px;font-size:0.8rem;color:#444;">
        <div style="font-weight:600;margin-bottom:8px;">Compared to similar streets</div>
        <div>Ottawa: ${phrasing(rel.city_percentile)} of ${classLabel} streets</div>
        ${nbLine}
      </div>`;
  }

  function renderNeighbourhoodRow(score, name) {
    if (score == null) return "";
    const color = scoreColor(score);
    const bg = color + "22";
    const label = name ? `${name} neighbourhood score` : "Neighbourhood score";
    return `
      <div style="margin-top:8px;padding:10px 12px;background:${bg};border-radius:8px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:0.82rem;color:#444;">🏘 ${label}</span>
        <span style="font-size:1.1rem;font-weight:700;color:${color}">${Math.round(score)}</span>
      </div>`;
  }

  function renderBusRoutesRow(routes) {
    if (!routes || !routes.length) return "";
    const names = routes.map(r => r.route_name).join(", ");
    const totalTrips = routes.reduce((s, r) => s + (r.weekday_trips || 0), 0);
    // Combined passes (all routes, both directions) over an 18-hour service day.
    const headway = totalTrips > 0 ? (18 * 60 / totalTrips) : null;
    const freqText = headway === null ? "" :
      headway < 2   ? " · continuous service" :
      headway < 60  ? ` · ~every ${Math.round(headway)} min` :
                      ` · ~every ${Math.round(headway / 60)} hr`;
    return `
      <div style="margin-top:16px;padding:10px 12px;background:#f5f5f5;border-radius:8px;font-size:0.82rem;color:#444;">
        <div style="font-weight:600;margin-bottom:4px;">🚌 Bus traffic</div>
        <div>Routes: ${names}${freqText}</div>
      </div>`;
  }

  function renderDevelopmentRow(data) {
    if (!data) return "";
    const { construction, development } = data;
    if (!construction.length && !development.length) return "";

    const typeLabel = t =>
      t === "Plan of Condominium"    ? "Condo plan"  :
      t === "Site Plan Control"      ? "Site plan"   :
      t === "Official Plan Amendment"? "OPA"         :
      t === "Plan of Subdivision"    ? "Subdivision" :
      t === "Demolition Control"     ? "Demolition"  :
      t;

    const constructionLabel = t => ({
      'RRSW':     'Road, sewer & water',
      'RD_RESF':  'Road resurfacing',
      'RD_SURF':  'Road surface treatment',
      'RD_SWRE':  'Sidewalk renewal',
      'RD_CS':    'Road crack sealing',
      'RD_MUPR':  'Multi-use pathway renewal',
      'RD_RECO':  'Road reconstruction',
      'RS':       'Sewer renewal',
      'RSL':      'Sewer lining',
      'RWM':      'Watermain renewal',
      'SCR':      'Culvert renewal',
      'SWM':      'Stormwater management',
      'SBR':      'Bridge renewal',
      'WBO':      'Work by others',
      'MIM':      'Intersection modifications',
      'GNR':      'New road',
      'MS':       'New sidewalk',
      'RSS':      'Streetscaping',
      'CREN':     'Cycling renewal',
      'GNT':      'New transit',
    }[t] || t);

    const constructionStatus = s => s === 'INPROGRESS' ? 'In progress' : s === 'PLANNED' ? 'Planned' : s;

    let html = `<div style="font-weight:600;margin-bottom:6px;">Nearby activity</div>`;

    if (construction.length) {
      html += `<div style="margin-top:4px;font-weight:500;">🚧 City construction nearby:</div>`;
      for (const c of construction) {
        const label = constructionLabel(c.feature_type);
        const status = constructionStatus(c.status);
        const timing = c.targeted_start || '';
        const meta = [status, timing].filter(Boolean).join(' · ');
        const impacts = c.traffic_impacts ? ` <span style="color:#b45309;">— ${c.traffic_impacts}</span>` : '';
        const distStr = c.distance_m != null ? ` <span style="color:#bbb;">${c.distance_m}m</span>` : '';
        html += `<div style="margin-top:3px;">${label} · <span style="color:#888;">${meta}</span>${impacts}${distStr}</div>`;
      }
    }

    if (development.length) {
      const hasBoth = construction.length > 0;
      html += `<div style="margin-top:${hasBoth ? 14 : 4}px;${hasBoth ? 'padding-top:10px;border-top:1px solid #fde8d0;' : ''}font-weight:500;">🏗️ Planning applications nearby:</div>`;
      for (const d of development) {
        const label = typeLabel(d.application_type);
        const addrText = d.address || d.application_number;
        const addr = d.in_devapps
          ? `<a href="https://devapps.ottawa.ca/en/applications/${d.application_number}/details" target="_blank" rel="noopener" style="color:#9a3412;text-decoration:underline;">${addrText}</a>`
          : addrText;
        const parts = [];
        if (d.storeys && d.unit_count) parts.push(`${d.storeys} storeys, ${d.unit_count} units`);
        else if (d.storeys)            parts.push(`${d.storeys} storeys`);
        else if (d.unit_count)         parts.push(`${d.unit_count} units`);
        const metaStr = parts.length ? ` · <span style="color:#b45309;">${parts[0]}</span>` : "";
        const distStr = d.distance_m != null ? ` <span style="color:#bbb;">${d.distance_m}m</span>` : "";
        html += `<div style="margin-top:3px;">${label}: ${addr}${metaStr}${distStr}</div>`;
      }
    }

    return `
      <div style="margin-top:8px;padding:10px 12px;background:#fff7ed;border-left:3px solid #fb923c;border-radius:8px;font-size:0.82rem;color:#444;">
        ${html}
      </div>`;
  }

  function segmentCentroid(geometry) {
    if (!geometry) return null;
    const coords = geometry.type === "LineString"
      ? geometry.coordinates[Math.floor(geometry.coordinates.length / 2)]
      : geometry.coordinates[0][0];
    return { lat: coords[1], lng: coords[0] };
  }

  function renderSidebar(props, geometry = null) {
    shareData = {
      name: props.name, address: null, score: props.composite_score,
      volume: props.volume_score, speed: props.speed_score, safety: props.safety_score,
      relData: null, nbScore: null, nbName: null,
    };
    const content = document.getElementById("sidebar-content");
    const composite = props.composite_score;

    const scoreRows = [
      { label: "Volume",      value: props.volume_score },
      { label: "Speed",       value: props.speed_score },
      { label: "Safety",      value: props.safety_score },
      { label: "Cut-through", value: props.cutthrough_score },
      { label: "Trend",       value: props.trend_score },
    ];

    const noData = props.volume_score == null;
    const bgColor = noData ? "#f5f5f5" : `${scoreColor(composite)}22`;

    content.innerHTML = `
      <h2>${props.name || "Unnamed street"}</h2>
      <div class="road-class">${props.road_class || ""} · ${props.speed_limit ? props.speed_limit + " km/h" : "speed limit unknown"}</div>

      <div class="composite-score" style="background:${bgColor}">
        <div class="big" style="color:${noData ? "#aaa" : scoreColor(composite)}">${noData ? "—" : Math.round(composite)}</div>
        <div>${noData ? "No traffic data" : scoreLabel(composite)}</div>
      </div>

      <div style="font-size:0.8rem;color:#888;margin-bottom:12px;">Score components (0=best, 100=worst)</div>

      ${scoreRows.map(row => `
        <div class="score-row">
          <div class="score-label">${row.label}</div>
          <div class="score-bar-wrap">
            <div class="score-bar"
              style="width:${row.value != null ? row.value : 0}%;background:${barColor(row.value)}">
            </div>
          </div>
          <div class="score-value">${row.value != null ? Math.round(row.value) : "—"}</div>
        </div>
      `).join("")}

      ${scoreDefinitionsHtml}

      <div id="relative-row"></div>
      <div id="nb-row"></div>
      <div id="bus-routes-row"></div>
      <div id="development-row"></div>

      ${props.cutthrough_risk != null ? `
        <div style="margin-top:12px;font-size:0.8rem;color:#666;">
          Cut-through risk: ${(props.cutthrough_risk * 100).toFixed(0)}%
          (connects arterial roads: ${props.cutthrough_risk > 0.5 ? "yes" : "no"})
        </div>
      ` : ""}

      <div style="margin-top:16px;font-size:0.75rem;color:#bbb;user-select:all;">ID: ${props.id}</div>
      <button id="share-btn" onclick="copyShareLink()" style="margin-top:12px;width:100%;padding:8px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;font-size:0.82rem;color:#555;cursor:pointer;">🔗 Share</button>
    `;

    openSidebar();

    // Async neighbourhood + relative scores
    const centroid = segmentCentroid(geometry);
    const centroidPromise = centroid
      ? Promise.resolve(centroid)
      : fetch(`/api/segments/${props.id}`).then(r => r.json()).then(seg => segmentCentroid(seg.geometry));

    centroidPromise.then(({ lat, lng }) =>
      Promise.all([
        fetch(`/api/neighbourhood?lat=${lat}&lng=${lng}`).then(r => r.json()),
        fetch(`/api/reverse-geocode?lat=${lat}&lng=${lng}`).then(r => r.json()),
        fetch(`/api/relative?road_class=${encodeURIComponent(props.road_class)}&score=${props.composite_score}&lat=${lat}&lng=${lng}`).then(r => r.json()).catch(() => null),
        fetch(`/api/bus-routes?lat=${lat}&lng=${lng}`).then(r => r.json()).catch(() => null),
        fetch(`/api/development-activity?lat=${lat}&lng=${lng}`).then(r => r.json()).catch(() => null),
      ])
    ).then(([nb, geo, rel, bus, dev]) => {
      shareData = { ...shareData, relData: rel, nbScore: nb?.avg_score, nbName: geo?.neighbourhood, busRoutes: bus?.routes, devData: dev };
      const relEl = document.getElementById("relative-row");
      if (relEl) relEl.innerHTML = renderRelativeRow(rel);
      const el = document.getElementById("nb-row");
      if (el && nb) el.innerHTML = renderNeighbourhoodRow(nb.avg_score, geo?.neighbourhood);
      const busEl = document.getElementById("bus-routes-row");
      if (busEl && bus) busEl.innerHTML = renderBusRoutesRow(bus.routes);
      const devEl = document.getElementById("development-row");
      if (devEl) devEl.innerHTML = renderDevelopmentRow(dev);
    }).catch(() => {});
  }

  function loadSegments() {
    const roadClass = document.getElementById("road-class-filter").value;
    const maxScore = parseInt(document.getElementById("max-score").value);

    const bounds = map.getBounds();
    const params = new URLSearchParams({
      min_lon: bounds.getWest().toFixed(4),
      min_lat: bounds.getSouth().toFixed(4),
      max_lon: bounds.getEast().toFixed(4),
      max_lat: bounds.getNorth().toFixed(4),
    });
    if (roadClass) params.append("road_class", roadClass);
    if (maxScore < 100) params.append("max_composite", maxScore);

    fetch(`/api/segments?${params}`)
      .then(r => r.json())
      .then(data => {
        if (segmentLayer) map.removeLayer(segmentLayer);

        segmentLayer = L.geoJSON(data, {
          style: feature => ({
            color: segmentColor(feature.properties),
            weight: 3,
            opacity: segmentOpacity(feature.properties),
          }),
          onEachFeature: (feature, layer) => {
            layer.on("click", () => renderSidebar(feature.properties, feature.geometry));
          },
        }).addTo(map);
      })
      .catch(err => console.error("Failed to load segments:", err));
  }

  // Share / deep-link helpers
  let shareData = null;

  function setShareUrl(q, type) {
    const url = new URL(window.location.href);
    url.search = `?q=${encodeURIComponent(q)}&type=${type}`;
    history.pushState(null, "", url.toString());
  }

  function buildShareText() {
    if (!shareData) return window.location.href;
    const { name, address, score, volume, speed, safety, relData, nbScore, nbName, busRoutes, devData } = shareData;

    const line1 = `📍 ${address || name || "Unknown street"}`;
    const shortLabel = score >= 65 ? "Busy" : score >= 35 ? "Moderate" : score >= 20 ? "Quiet" : "Very quiet";
    const line2 = `🚗 Score: ${Math.round(score)} — ${shortLabel}`;

    let relLine = "";
    if (relData?.city_percentile != null) {
      const pct = relData.city_percentile;
      const reinforces = (score >= 50 && pct >= 55) || (score < 35 && pct < 45);
      if (reinforces) {
        if (pct >= 80)      relLine = "Busier than most similar streets";
        else if (pct >= 55) relLine = "Busier than average for similar streets";
        else if (pct >= 20) relLine = "Quieter than average for similar streets";
        else                relLine = "Among the quietest similar streets";
      }
    }

    const trafficLine = score >= 65 ? "🚨 Noticeable traffic"
      : score >= 35 ? "⚠️ Some noticeable traffic"
      : score >= 20 ? "🙂 Light traffic"
      : "✅ Minimal traffic";

    let nbLine = "";
    if (nbScore != null) {
      const diff = score - nbScore;
      const where = nbName ? `in ${nbName}` : "in the area";
      if      (diff >  20) nbLine = `🏘 Among the busiest streets ${where}`;
      else if (diff >   8) nbLine = `🏘 Busier than most streets ${where}`;
      else if (diff <  -20) nbLine = `🏘 Among the quietest streets ${where}`;
      else if (diff <   -8) nbLine = `🏘 Quieter than most streets ${where}`;
      else                  nbLine = `🏘 About average for streets ${where}`;
    }

    const urlLine = `https://trafficscore.myke.org${window.location.search}`;

    const activityParts = [];
    if (busRoutes?.length) activityParts.push("🚌 Bus route");
    if (devData?.construction?.length) activityParts.push("🚧 Construction nearby");
    if (devData?.development?.length) activityParts.push("🏗️ Development nearby");
    const activityLine = activityParts.join("\n");

    // Group score + traffic descriptor together; separate name, neighbourhood, and URL with blank lines
    const scoreGroup = [line2, trafficLine].filter(Boolean).join("\n");
    return [line1, scoreGroup, nbLine, activityLine, urlLine].filter(Boolean).join("\n\n");
  }

  window.copyShareLink = function() {
    const text = buildShareText();
    const btn = document.getElementById("share-btn");
    if (navigator.share) {
      navigator.share({ title: "TrafficScore Ottawa", text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text).then(() => {
        if (btn) { btn.textContent = "✓ Copied!"; setTimeout(() => btn.textContent = "🔗 Share", 2000); }
      }).catch(() => {});
    }
  };

  // Search
  let searchLayer = null;
  let addressMarker = null;
  let searchAbort = null;
  const geocodeCache = new Map();

  function looksLikeAddress(q) {
    return /^\d+\s/.test(q);
  }

  function doStreetSearch(q) {
    if (addressMarker) { map.removeLayer(addressMarker); addressMarker = null; }
    closeSidebar();
    const resultsEl = document.getElementById("search-results");
    fetch(`/api/search?name=${encodeURIComponent(q)}`)
      .then(r => r.json())
      .then(data => {
        if (!data.features.length) {
          resultsEl.innerHTML = `<div style="color:#888;padding:4px 6px;">No results for "${q}"</div>`;
          return;
        }

        // Group by street name
        const byName = {};
        for (const f of data.features) {
          const n = f.properties.name || "Unnamed";
          if (!byName[n]) byName[n] = [];
          byName[n].push(f);
        }

        resultsEl.innerHTML = Object.entries(byName).map(([name, feats]) => {
          const avg = feats.reduce((s, f) => s + (f.properties.composite_score || 0), 0) / feats.length;
          return `<div class="search-result-item" data-name="${name}">
            <span>${name}</span>
            <span style="display:flex;align-items:center;gap:4px;color:#666;">
              ${Math.round(avg)}
              <span class="search-result-dot" style="background:${scoreColor(avg)}"></span>
            </span>
          </div>`;
        }).join("");

        // Click a result → fly to it, highlight, and open sidebar
        resultsEl.querySelectorAll(".search-result-item").forEach(el => {
          el.addEventListener("click", () => {
            const name = el.dataset.name;
            const feats = byName[name];
            setShareUrl(name, "street");

            if (searchLayer) map.removeLayer(searchLayer);
            searchLayer = L.geoJSON({ type: "FeatureCollection", features: feats }, {
              style: f => ({
                color: segmentColor(f.properties),
                weight: 5,
                opacity: segmentOpacity(f.properties),
              }),
              onEachFeature: (feature, layer) => {
                layer.on("click", () => renderSidebar(feature.properties, feature.geometry));
              },
            }).addTo(map);

            map.setView(searchLayer.getBounds().getCenter(), 17);
            renderSidebar(feats[0].properties, feats[0].geometry);
          });
        });

        // Auto-select if only one unique name
        if (Object.keys(byName).length === 1) {
          resultsEl.querySelector(".search-result-item").click();
        }
      })
      .catch(err => console.error("Search failed:", err));
  }

function addressMessage(score) {
    if (score < 20) return "Very quiet — great for kids playing outside.";
    if (score < 35) return "Quiet street with generally low traffic.";
    if (score < 65) return "Moderate traffic — some through-traffic likely.";
    return "Busy or high-traffic street — exercise caution.";
  }

  function renderAddressCard(segment, addressShortName, neighbourhood, neighbourhoodScore) {
    const p = segment.properties;
    shareData = {
      name: p.name, address: addressShortName, score: p.composite_score,
      volume: p.volume_score, speed: p.speed_score, safety: p.safety_score,
      relData: null, nbScore: neighbourhoodScore, nbName: neighbourhood,
    };
    const score = p.composite_score;
    const color = scoreColor(score);
    const bg = color + "22";

    const scoreRows = [
      { label: "Volume",      value: p.volume_score },
      { label: "Speed",       value: p.speed_score },
      { label: "Safety",      value: p.safety_score },
      { label: "Cut-through", value: p.cutthrough_score },
    ];

    const content = document.getElementById("sidebar-content");

    content.innerHTML = `
      <h2>📍 ${addressShortName}</h2>
      <div class="road-class">${p.road_class || ""} · ${p.speed_limit ? p.speed_limit + " km/h" : "speed limit unknown"}</div>

      <div class="composite-score" style="background:${bg}">
        <div class="big" style="color:${color}">${Math.round(score)}</div>
        <div>${scoreLabel(score)}</div>
      </div>

      <div class="addr-message">${addressMessage(score)}</div>

      <div style="font-size:0.8rem;color:#888;margin-bottom:12px;">Score components (0=best, 100=worst)</div>

      ${scoreRows.map(row => `
        <div class="score-row">
          <div class="score-label">${row.label}</div>
          <div class="score-bar-wrap">
            <div class="score-bar"
              style="width:${row.value != null ? row.value : 0}%;background:${scoreColor(row.value)}">
            </div>
          </div>
          <div class="score-value">${row.value != null ? Math.round(row.value) : "—"}</div>
        </div>
      `).join("")}

      ${scoreDefinitionsHtml}

      <div id="relative-row"></div>
      ${renderNeighbourhoodRow(neighbourhoodScore, neighbourhood)}
      <div id="bus-routes-row"></div>
      <div id="development-row"></div>
      <button id="share-btn" onclick="copyShareLink()" style="margin-top:12px;width:100%;padding:8px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;font-size:0.82rem;color:#555;cursor:pointer;">🔗 Share</button>
    `;

    openSidebar();
  }

  function doAddressSearch(q) {
    const resultsEl = document.getElementById("search-results");
    resultsEl.innerHTML = `<div style="color:#888;padding:4px 6px;">Looking up address…</div>`;
    closeSidebar();

    // Cancel any in-flight search
    if (searchAbort) searchAbort.abort();
    searchAbort = new AbortController();
    const signal = searchAbort.signal;

    const geocodeKey = q.toLowerCase();
    const cached = geocodeCache.get(geocodeKey);
    const geocodePromise = cached
      ? Promise.resolve(cached)
      : fetch(`/api/geocode?q=${encodeURIComponent(q)}`, { signal })
          .then(r => r.json())
          .then(results => {
            if (results.length) geocodeCache.set(geocodeKey, results);
            return results;
          });

    geocodePromise
      .then(results => {
        if (signal.aborted) return;
        if (!results.length) {
          resultsEl.innerHTML = "";
          doStreetSearch(q);
          return;
        }

        const { lat, lon, display_name } = results[0];
        const latF = parseFloat(lat), lonF = parseFloat(lon);

        // Drop a pin and fly to it
        if (addressMarker) map.removeLayer(addressMarker);
        addressMarker = L.marker([latF, lonF], {
          icon: L.divIcon({
            className: "",
            html: '<div style="width:14px;height:14px;background:#3b82f6;border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>',
            iconSize: [14, 14],
            iconAnchor: [7, 7],
          })
        }).addTo(map);
        map.setView([latF, lonF], 18);

        // Nominatim sometimes splits house number: "564, Highcroft Avenue, ..."
        const dnParts = display_name.split(", ");
        const shortName = /^\d+$/.test(dnParts[0]) ? `${dnParts[0]} ${dnParts[1]}` : dnParts[0];

        // Load nearby streets, neighbourhood score, and neighbourhood name in parallel
        Promise.all([
          fetch(`/api/segments/nearby?lat=${lat}&lng=${lon}&radius_m=200`, { signal }).then(r => r.json()),
          fetch(`/api/neighbourhood?lat=${lat}&lng=${lon}`, { signal }).then(r => r.json()),
          fetch(`/api/reverse-geocode?lat=${lat}&lng=${lon}`, { signal }).then(r => r.json()),
        ]).then(([data, nbData, geoData]) => {
            if (signal.aborted) return;
            const nearby = data.features;
            const neighbourhood = geoData.neighbourhood;

            resultsEl.innerHTML = "";

            if (!nearby.length) {
              resultsEl.innerHTML = `<div style="color:#888;padding:4px 6px;">No scored streets within 200m</div>`;
              return;
            }

            // Highlight nearby streets on map
            if (searchLayer) map.removeLayer(searchLayer);
            searchLayer = L.geoJSON(data, {
              style: f => ({
                color: segmentColor(f.properties),
                weight: 5,
                opacity: segmentOpacity(f.properties),
              }),
              onEachFeature: (feature, layer) => {
                layer.on("click", () => renderSidebar(feature.properties, feature.geometry));
              },
            }).addTo(map);

            // Always use the geometrically closest segment
            const nearest = nearby[0];
            if (!nearest.properties.name) {
              nearest.properties.name = q.replace(/^\d+\s+/, "")
                .replace(/\b\w/g, c => c.toUpperCase());
            }
            renderAddressCard(nearest, shortName, neighbourhood, nbData.avg_score);
            setShareUrl(q, "address");

            // Async relative + bus route stats
            const p = nearest.properties;
            Promise.all([
              fetch(`/api/relative?road_class=${encodeURIComponent(p.road_class)}&score=${p.composite_score}&lat=${lat}&lng=${lon}`).then(r => r.json()).catch(() => null),
              fetch(`/api/bus-routes?lat=${lat}&lng=${lon}`).then(r => r.json()).catch(() => null),
              fetch(`/api/development-activity?lat=${lat}&lng=${lon}`).then(r => r.json()).catch(() => null),
            ]).then(([rel, bus, dev]) => {
              shareData = { ...shareData, relData: rel, busRoutes: bus?.routes, devData: dev };
              const relEl = document.getElementById("relative-row");
              if (relEl && rel) relEl.innerHTML = renderRelativeRow(rel);
              const busEl = document.getElementById("bus-routes-row");
              if (busEl && bus) busEl.innerHTML = renderBusRoutesRow(bus.routes);
              const devEl = document.getElementById("development-row");
              if (devEl) devEl.innerHTML = renderDevelopmentRow(dev);
            }).catch(() => {});

            // Show other nearby streets as a secondary list
            const byName = {};
            for (const f of nearby) {
              const n = f.properties.name || "Unnamed";
              if (n === (nearest.properties.name || "Unnamed")) continue;
              if (!byName[n]) byName[n] = [];
              byName[n].push(f);
            }

            if (Object.keys(byName).length) {
              const nearbyNames = Object.entries(byName).slice(0, 5);
              const startOpen = !isMobile();
              const itemsHtml = nearbyNames.map(([name, feats]) => {
                const avg = feats.reduce((s, f) => s + (f.properties.composite_score || 0), 0) / feats.length;
                const dist = Math.round(feats[0].properties.distance_m);
                return `<div class="search-result-item" data-name="${name}">
                  <span>${name} <span style="color:#bbb;font-size:0.75rem;">${dist}m</span></span>
                  <span style="display:flex;align-items:center;gap:4px;color:#666;">
                    ${Math.round(avg)}
                    <span class="search-result-dot" style="background:${scoreColor(avg)}"></span>
                  </span>
                </div>`;
              }).join("");

              resultsEl.innerHTML = `
                <div id="nearby-toggle" style="font-size:0.75rem;color:#666;padding:4px 6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #eee;margin-top:4px;">
                  <span>Nearby streets</span>
                  <span id="nearby-arrow">${startOpen ? "▴" : "▾"}</span>
                </div>
                <div id="nearby-list" style="display:${startOpen ? "block" : "none"}">${itemsHtml}</div>
              `;

              document.getElementById("nearby-toggle").addEventListener("click", () => {
                const list = document.getElementById("nearby-list");
                const arrow = document.getElementById("nearby-arrow");
                const open = list.style.display === "none";
                list.style.display = open ? "block" : "none";
                arrow.textContent = open ? "▴" : "▾";
              });

              resultsEl.querySelectorAll(".search-result-item").forEach(el => {
                el.addEventListener("click", () => {
                  const feats = byName[el.dataset.name];
                  renderSidebar(feats[0].properties, feats[0].geometry);
                });
              });
            }
          });
      })
      .catch(err => {
        if (err.name === "AbortError") return;
        doStreetSearch(q);
      });
  }

  document.getElementById("search-form").addEventListener("submit", e => {
    e.preventDefault();
    const q = document.getElementById("search-input").value.trim();
    if (q.length < 2) return;
    if (looksLikeAddress(q)) {
      doAddressSearch(q);
    } else {
      doStreetSearch(q);
    }
  });

  // Close sidebar
  document.getElementById("close-sidebar").addEventListener("click", closeSidebar);

  // Handle tap: toggle peek ↔ open
  document.getElementById("sidebar-handle").addEventListener("click", () => {
    if (!isMobile()) return;
    const sidebar = document.getElementById("sidebar");
    if (sidebar.classList.contains("peek")) {
      sidebar.classList.remove("peek");
      sidebar.classList.add("open");
      document.body.classList.remove("sidebar-peek");
      document.body.classList.add("sidebar-open");
    } else if (sidebar.classList.contains("open")) {
      sidebar.classList.remove("open");
      sidebar.classList.add("peek");
      document.body.classList.remove("sidebar-open");
      document.body.classList.add("sidebar-peek");
    }
  });

  // Filters toggle
  document.getElementById("filters-toggle").addEventListener("click", () => {
    const panel = document.getElementById("filters-panel");
    const btn = document.getElementById("filters-toggle");
    const open = panel.classList.toggle("open");
    btn.textContent = open ? "Filters ▴" : "Filters ▾";
  });

  const maxScoreInput = document.getElementById("max-score");
  const maxScoreLabel = document.getElementById("max-score-label");
  maxScoreInput.addEventListener("input", () => {
    const v = parseInt(maxScoreInput.value);
    maxScoreLabel.textContent = v < 100 ? `≤ ${v}` : "Any";
  });

  document.getElementById("road-class-filter").addEventListener("change", loadSegments);
  maxScoreInput.addEventListener("change", loadSegments);

  // Load on map move (debounced)
  let moveTimer = null;
  map.on("moveend", () => {
    clearTimeout(moveTimer);
    moveTimer = setTimeout(loadSegments, 400);
  });

  // Initial load
  loadSegments();

  // Auto-trigger search from shared URL
  (function() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");
    const type = params.get("type");
    if (!q) return;
    document.getElementById("search-input").value = q;
    if (type === "address" || looksLikeAddress(q)) {
      doAddressSearch(q);
    } else {
      doStreetSearch(q);
    }
  })();
</script>
</body>
</html>
